phrase:
  file_format: yml
  push:
    sources:
      - file: ./locales/<locale_name>.yml
        project_id: 87f380565e156f714052a7faf336aaa7
        params:
          mark_reviewed: true
          update_translations: true
  pull:
    targets:
      - file: ./locales/<locale_name>.yml
        project_id: 87f380565e156f714052a7faf336aaa7
        params:
          include_empty_translations: true
          exclude_empty_zero_forms: true
          include_translated_keys: true